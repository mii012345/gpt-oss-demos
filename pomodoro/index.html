<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pomodoro Timer</title>
<style>
:root{--bg:#121212;--fg:#e0e0e0;--accent:#ff6b6b;--ring:#444}
@media (prefers-color-scheme:light){:root{--bg:#f5f5f5;--fg:#222;--accent:#ff6b6b;--ring:#ddd}}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--fg);display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column}
#timer{font-size:4rem;margin:20px}
#controls button{margin:5px;padding:10px 20px;background:var(--accent);border:none;color:#fff;border-radius:5px;cursor:pointer}
#controls button:disabled{background:#777}
#session{margin-top:10px;font-size:1.2rem}
#progress{width:200px;height:200px;position:relative}
#progress svg{transform:rotate(-90deg);width:100%;height:100%}
#progress circle{fill:none;stroke:var(--ring);stroke-width:10}
#progress circle#progress-ring{stroke:var(--accent);stroke-linecap:round}
@media(max-width:400px){#timer{font-size:3rem}}
</style>
</head>
<body>
<div id="progress">
<svg viewBox="0 0 100 100">
<circle r="45" cx="50" cy="50" stroke-width="10" stroke="var(--ring)" fill="none"/>
<circle id="progress-ring" r="45" cx="50" cy="50" stroke-width="10" stroke="var(--accent)" fill="none"/>
</svg>
</div>
<div id="timer">25:00</div>
<div id="controls">
<button id="start">Start</button>
<button id="pause" disabled>Pause</button>
<button id="reset">Reset</button>
</div>
<div id="session">Pomodoros completed: 0</div>
<script>
const workDuration=25*60, breakDuration=5*60;
let mode='work';let remaining=workDuration;let timer=null;let sessionCount=0;
const timerEl=document.getElementById('timer');const startBtn=document.getElementById('start');const pauseBtn=document.getElementById('pause');const resetBtn=document.getElementById('reset');const sessionEl=document.getElementById('session');const ring=document.getElementById('progress-ring');
const circumference=2*Math.PI*45;ring.style.strokeDasharray=circumference;ring.style.strokeDashoffset=circumference;
function updateDisplay(){const m=Math.floor(remaining/60).toString().padStart(2,'0');const s=(remaining%60).toString().padStart(2,'0');timerEl.textContent=`${m}:${s}`;const progress=1-remaining/(mode==='work'?workDuration:breakDuration);ring.style.strokeDashoffset=circumference*(1-progress);}
function beep(){const ctx=new AudioContext();const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(1000,ctx.currentTime);osc.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.2);}
function tick(){if(remaining>0){remaining--;updateDisplay();}else{beep();if(mode==='work'){sessionCount++;sessionEl.textContent=`Pomodoros completed: ${sessionCount}`;mode='break';remaining=breakDuration;}else{mode='work';remaining=workDuration;}updateDisplay();}}
function start(){if(timer)return;timer=setInterval(tick,1000);startBtn.disabled=true;pauseBtn.disabled=false;}
function pause(){clearInterval(timer);timer=null;startBtn.disabled=false;pauseBtn.disabled=true;}
function reset(){pause();remaining=mode==='work'?workDuration:breakDuration;updateDisplay();}
startBtn.addEventListener('click',start);pauseBtn.addEventListener('click',pause);resetBtn.addEventListener('click',reset);
updateDisplay();
</script>
</body>
</html>
